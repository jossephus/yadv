name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run package:smoke

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

  standalone:
    needs: verify
    environment: npm
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
          - target: darwin-x64
            runner: macos-15-intel
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: linux-x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - run: bun run build:standalone -- ${{ matrix.target }}

      - run: bun run build:npm-packages -- ${{ matrix.target }}
        env:
          YADV_REUSE_RELEASE_BINARY: "1"

      - name: Publish npm binary package
        run: |
          package_dir="dist/npm/binaries/${{ matrix.target }}"
          name="$(node -p "require('./${package_dir}/package.json').name")"
          version="$(node -p "require('./${package_dir}/package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published."
            exit 0
          fi
          npm publish "${package_dir}"

      - name: Upload standalone release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "dist/release/yadv-${{ matrix.target }}.tar.gz" "dist/release/yadv-${{ matrix.target }}.tar.gz.sha256" --clobber

  publish:
    runs-on: ubuntu-latest
    needs: standalone
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v${version}" = "${GITHUB_REF_NAME}"

      - run: bun run build:npm-packages -- main

      - run: npm pack --dry-run
        working-directory: dist/npm/main

      - name: Publish npm package
        working-directory: dist/npm/main
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published."
            exit 0
          fi
          npm publish
